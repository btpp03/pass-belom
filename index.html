<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Collection</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f7f8fa;}
        h1 { color: #333;}
        form { margin-bottom: 30px;}
        input, button { padding: 8px; margin: 5px; }
        table { width: 100%; border-collapse: collapse;}
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left;}
        th { background: #e3e7ed;}
    </style>
</head>
<body>
    <h1>Book Collection</h1>
    <form id="bookForm">
        <input type="text" id="title" placeholder="Title" required>
        <input type="text" id="author" placeholder="Author" required>
        <input type="number" id="year" placeholder="Year" min="1000" max="9999" required>
        <button type="submit">Add Book</button>
    </form>
    <table id="booksTable">
        <thead>
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Year</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <script>
        const form = document.getElementById('bookForm');
        const tableBody = document.querySelector('#booksTable tbody');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            let title = document.getElementById('title').value.trim();
            let author = document.getElementById('author').value.trim();
            let year = document.getElementById('year').value.trim();

            if (!title || !author || !year) return;

            // Add new row to table
            let row = document.createElement('tr');
            row.innerHTML = `<td>${title}</td><td>${author}</td><td>${year}</td>`;
            tableBody.appendChild(row);

            // Clear the form
            form.reset();
        });
    </script>
</body>
</html>
